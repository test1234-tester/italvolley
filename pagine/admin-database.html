<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Database Biglietti | ItalVolley</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:    #001f4d;
            --blue:    #003366;
            --azure:   #0073CF;
            --red:     #ce2b37;
            --gold:    #ffc107;
            --bg:      #07111f;
            --surface: #0d1e33;
            --card:    #112240;
            --border:  rgba(0, 115, 207, 0.18);
            --text:    #e8f4fd;
            --muted:   rgba(232, 244, 253, 0.45);
            --success: #4caf50;
            --radius:  14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── SFONDO ANIMATO ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 15% 20%, rgba(0,115,207,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 50% 35% at 85% 75%, rgba(206,43,55,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(7,17,31,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-brand .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: var(--text);
        }

        .admin-badge {
            background: linear-gradient(135deg, var(--red), #a01e28);
            color: white;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-refresh, .btn-reset {
            padding: 7px 16px;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
            letter-spacing: 0.5px;
        }

        .btn-refresh {
            background: rgba(0,115,207,0.18);
            border: 1px solid rgba(0,115,207,0.4);
            color: #7ec8f5;
        }
        .btn-refresh:hover { background: rgba(0,115,207,0.35); }

        .btn-reset {
            background: rgba(206,43,55,0.14);
            border: 1px solid rgba(206,43,55,0.4);
            color: #f08090;
        }
        .btn-reset:hover { background: rgba(206,43,55,0.28); }

        .last-update {
            font-size: 0.7rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ── CONTENUTO PRINCIPALE ── */
        main {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px 60px;
        }

        /* ── KPI CARDS ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 36px;
        }

        .kpi-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .kpi-card.blue::before  { background: linear-gradient(90deg, var(--azure), #00a8ff); }
        .kpi-card.red::before   { background: linear-gradient(90deg, var(--red), #ff6b6b); }
        .kpi-card.gold::before  { background: linear-gradient(90deg, var(--gold), #ffdd57); }
        .kpi-card.green::before { background: linear-gradient(90deg, var(--success), #80e080); }

        .kpi-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .kpi-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
        }

        .kpi-card.blue  .kpi-value { color: #7ec8f5; }
        .kpi-card.red   .kpi-value { color: #f08090; }
        .kpi-card.gold  .kpi-value { color: var(--gold); }
        .kpi-card.green .kpi-value { color: #80e080; }

        .kpi-sub {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 6px;
        }

        /* ── TABS PARTITA ── */
        .tabs-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .tab-btn {
            flex-shrink: 0;
            padding: 10px 22px;
            border-radius: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s;
        }
        .tab-btn:hover { border-color: var(--azure); color: var(--text); }
        .tab-btn.active {
            background: linear-gradient(135deg, var(--blue), var(--azure));
            border-color: var(--azure);
            color: white;
            box-shadow: 0 4px 18px rgba(0,115,207,0.3);
        }

        /* ── PANEL PARTITA ── */
        .match-panel { display: none; animation: fadeIn 0.3s ease; }
        .match-panel.active { display: block; }

        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── GRIGLIA SETTORI ── */
        .sectors-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 28px;
        }

        .sector-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: transform 0.2s;
        }
        .sector-card:hover { transform: translateY(-2px); }

        .sector-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }

        .sector-name-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--azure);
        }

        .sector-vip-tag {
            background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.4);
            color: var(--gold);
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .sector-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .stat-pill {
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .stat-pill .val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .stat-pill .lbl { font-size: 0.6rem; color: var(--muted); margin-top: 2px; }

        .stat-pill.occupied .val { color: #f08090; }
        .stat-pill.free .val     { color: #80e080; }
        .stat-pill.revenue .val  { color: var(--gold); font-size: 0.85rem; }

        /* Barra occupazione */
        .occ-bar-wrap { margin-bottom: 14px; }
        .occ-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.68rem;
            color: var(--muted);
            margin-bottom: 5px;
        }
        .occ-bar-track {
            height: 6px;
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            overflow: hidden;
        }
        .occ-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s cubic-bezier(.4,0,.2,1);
        }

        /* Mini mappa posti */
        .mini-seat-map {
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            padding: 10px 8px;
            overflow-x: auto;
        }

        .mini-map-label {
            text-align: center;
            font-size: 0.55rem;
            letter-spacing: 3px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .mini-seat-row {
            display: flex;
            gap: 3px;
            justify-content: center;
            margin-bottom: 3px;
        }

        .mini-seat {
            width: 14px;
            height: 14px;
            border-radius: 3px 3px 1px 1px;
            flex-shrink: 0;
        }
        .mini-seat.free     { background: rgba(76,175,80,0.35); border: 1px solid rgba(76,175,80,0.5); }
        .mini-seat.taken    { background: rgba(206,43,55,0.7);  border: 1px solid rgba(206,43,55,0.9); }
        .mini-seat.vip-free { background: rgba(255,193,7,0.25); border: 1px solid rgba(255,193,7,0.5); }
        .mini-seat.vip-taken{ background: rgba(255,150,0,0.8);  border: 1px solid #ffc107; }
        .mini-seat-gap { width: 6px; }

        /* ── TABELLA BIGLIETTI ── */
        .table-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .table-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--azure);
        }

        .table-counter {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .tickets-table {
            width: 100%;
            border-collapse: collapse;
        }

        .tickets-table thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
        }

        .tickets-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }
        .tickets-table tbody tr:hover { background: rgba(0,115,207,0.07); }

        .tickets-table tbody td {
            padding: 12px 16px;
            font-size: 0.83rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-sector {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .badge-nord  { background:rgba(0,115,207,0.2); color:#7ec8f5; border:1px solid rgba(0,115,207,0.3); }
        .badge-sud   { background:rgba(76,175,80,0.15); color:#80e080; border:1px solid rgba(76,175,80,0.3); }
        .badge-ovest { background:rgba(156,39,176,0.15); color:#ce93d8; border:1px solid rgba(156,39,176,0.3); }
        .badge-est   { background:rgba(255,193,7,0.15); color:var(--gold); border:1px solid rgba(255,193,7,0.3); }

        .seat-code {
            font-weight: 700;
            color: var(--text);
            letter-spacing: 1px;
        }

        .price-cell { color: var(--gold); font-weight: 700; }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--muted);
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-state p { font-size: 0.9rem; }

        /* ── MATCH OVERVIEW HEADER ── */
        .match-overview {
            background: linear-gradient(135deg, rgba(0,51,102,0.6), rgba(0,115,207,0.25));
            border: 1px solid rgba(0,115,207,0.25);
            border-radius: var(--radius);
            padding: 20px 28px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }

        .match-overview-teams {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .match-overview-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .meta-chip {
            background: rgba(255,255,255,0.07);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.78rem;
            color: var(--muted);
        }

        .match-overview-totals {
            display: flex;
            gap: 20px;
        }

        .ov-stat { text-align: center; }
        .ov-stat .ov-val {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .ov-stat .ov-lbl { font-size: 0.62rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

        /* ── RESPONSIVE ── */
        @media (max-width: 700px) {
            header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
            main { padding: 20px 14px 50px; }
            .tickets-table thead th:nth-child(n+4) { display: none; }
            .tickets-table tbody td:nth-child(n+4) { display: none; }
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,115,207,0.35); border-radius: 10px; }
    </style>
</head>
<body>

<header>
    <div class="header-brand">
        <div class="logo-text">ITALVOLLEY</div>
        <div class="admin-badge">⚙ Admin DB</div>
    </div>
    <div class="header-actions">
        <span class="last-update" id="last-update">—</span>
        <button class="btn-refresh" onclick="loadData()">↻ Aggiorna</button>
        <button class="btn-reset" onclick="resetDatabase()">⚠ Reset DB</button>
    </div>
</header>

<main>

    <!-- KPI GLOBALI -->
    <div class="kpi-grid" id="kpi-grid">
        <div class="kpi-card blue">
            <div class="kpi-label">Biglietti Venduti</div>
            <div class="kpi-value" id="kpi-sold">—</div>
            <div class="kpi-sub">su tutte le partite</div>
        </div>
        <div class="kpi-card green">
            <div class="kpi-label">Posti Disponibili</div>
            <div class="kpi-value" id="kpi-available">—</div>
            <div class="kpi-sub">posti ancora liberi</div>
        </div>
        <div class="kpi-card red">
            <div class="kpi-label">Occupazione Media</div>
            <div class="kpi-value" id="kpi-occ">—</div>
            <div class="kpi-sub">% riempimento totale</div>
        </div>
        <div class="kpi-card gold">
            <div class="kpi-label">Incasso Totale</div>
            <div class="kpi-value" id="kpi-revenue">—</div>
            <div class="kpi-sub">biglietti + prevendita</div>
        </div>
    </div>

    <!-- TABS PARTITE -->
    <div class="tabs-wrapper" id="tabs-wrapper"></div>

    <!-- PANELS PARTITE -->
    <div id="panels-container"></div>

</main>

<script>
// ─────────────────────────────────────────
//  DATI DI RIFERIMENTO (sincronizzati con biglietti.html)
// ─────────────────────────────────────────
const STORAGE_KEY = 'italvolley_tickets_db';

const matchesDB = {
    m1: { team: "Bulgaria",  flag: "🇧🇬", date: "3 Giu 2026", time: "21:30", venue: "Arena BRB Nilson Nelson" },
    m2: { team: "Olanda",    flag: "🇳🇱", date: "6 Giu 2026", time: "01:00", venue: "TBD" },
    m3: { team: "Turchia",   flag: "🇹🇷", date: "6 Giu 2026", time: "20:30", venue: "TBD" },
    m4: { team: "Brasile",   flag: "🇧🇷", date: "7 Giu 2026", time: "19:30", venue: "TBD" }
};

const baseSectors = {
    nord:  { label: 'Settore Nord',      price: 25, rows: 5, cols: 12, isVip: false },
    sud:   { label: 'Settore Sud',       price: 25, rows: 5, cols: 12, isVip: false },
    ovest: { label: 'Tribuna Ovest',     price: 35, rows: 4, cols: 10, isVip: false },
    est:   { label: 'Tribuna VIP Est',   price: 60, rows: 3, cols:  8, isVip: true  }
};

const initialBookings = {
    m1: { nord: ["1-3","1-7","2-4"],              sud: ["1-1","1-2","3-5"],    ovest: ["1-2","2-1"],       est: ["1-1","3-6"]       },
    m2: { nord: ["4-8","4-9","5-2"],              sud: ["2-10","2-11"],        ovest: ["3-4","3-5"],       est: ["2-4"]             },
    m3: { nord: ["2-5","2-6","3-1"],              sud: ["4-3","5-7"],          ovest: ["4-7","4-8"],       est: ["3-7","3-8"]       },
    m4: { nord: ["1-1","1-2","1-3","1-4"],        sud: ["5-8","5-9"],          ovest: ["1-5","1-6","4-9","4-10"], est: ["1-1","1-2","2-4"] }
};

let dbState = {};

// ─────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────
function seatIdToLabel(id) {
    const [r, c] = id.split('-').map(Number);
    return String.fromCharCode(64 + r) + c;
}

function occColor(pct) {
    if (pct >= 80) return '#f08090';
    if (pct >= 50) return var_gold();
    return '#80e080';
}
function var_gold() { return '#ffc107'; }

function formatEuro(n) {
    return '€' + n.toLocaleString('it-IT', { minimumFractionDigits: 0 });
}

// ─────────────────────────────────────────
//  CARICA DATI
// ─────────────────────────────────────────
function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    dbState = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(initialBookings));

    const now = new Date();
    document.getElementById('last-update').textContent =
        'Aggiornato: ' + now.toLocaleTimeString('it-IT');

    renderKpis();
    renderTabs();
    renderAllPanels();
}

function resetDatabase() {
    if (!confirm('⚠️ Sei sicuro? Tutti i biglietti verranno cancellati definitivamente.')) return;
    const empty = {};
    for (const matchId of Object.keys(matchesDB)) {
        empty[matchId] = {};
        for (const secKey of Object.keys(baseSectors)) {
            empty[matchId][secKey] = [];
        }
    }
    dbState = empty;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dbState));
    loadData();
    alert('✅ Database azzerato. Nessun posto occupato.');
}

// ─────────────────────────────────────────
//  KPI GLOBALI
// ─────────────────────────────────────────
function renderKpis() {
    let totalSold = 0, totalSeats = 0, totalRevenue = 0;

    for (const [matchId, sectors] of Object.entries(dbState)) {
        for (const [secKey, secData] of Object.entries(baseSectors)) {
            const taken = (sectors[secKey] || []).length;
            const total = secData.rows * secData.cols;
            totalSold    += taken;
            totalSeats   += total;
            totalRevenue += taken * (secData.price + 2);
        }
    }

    const available = totalSeats - totalSold;
    const occ = totalSeats > 0 ? Math.round(totalSold / totalSeats * 100) : 0;

    document.getElementById('kpi-sold').textContent      = totalSold;
    document.getElementById('kpi-available').textContent = available;
    document.getElementById('kpi-occ').textContent       = occ + '%';
    document.getElementById('kpi-revenue').textContent   = formatEuro(totalRevenue);
}

// ─────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────
function renderTabs() {
    const wrapper = document.getElementById('tabs-wrapper');
    wrapper.innerHTML = '';

    Object.entries(matchesDB).forEach(([id, match], i) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
        btn.dataset.match = id;
        btn.innerHTML = `🇮🇹 ITA vs ${match.team} ${match.flag}<br><small style="font-weight:400;font-size:0.72rem;opacity:0.7">${match.date} · ${match.time}</small>`;
        btn.onclick = () => switchTab(id);
        wrapper.appendChild(btn);
    });
}

function switchTab(matchId) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn[data-match="${matchId}"]`)?.classList.add('active');
    document.querySelectorAll('.match-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + matchId)?.classList.add('active');
}

// ─────────────────────────────────────────
//  PANELS
// ─────────────────────────────────────────
function renderAllPanels() {
    const container = document.getElementById('panels-container');
    container.innerHTML = '';

    Object.entries(matchesDB).forEach(([matchId, match], i) => {
        const panel = document.createElement('div');
        panel.className = 'match-panel' + (i === 0 ? ' active' : '');
        panel.id = 'panel-' + matchId;

        const sectors = dbState[matchId] || {};
        let matchSold = 0, matchTotal = 0, matchRevenue = 0;

        for (const [sk, sd] of Object.entries(baseSectors)) {
            const taken = (sectors[sk] || []).length;
            matchSold    += taken;
            matchTotal   += sd.rows * sd.cols;
            matchRevenue += taken * (sd.price + 2);
        }
        const matchOcc = matchTotal > 0 ? Math.round(matchSold / matchTotal * 100) : 0;

        // ── Overview ──
        panel.innerHTML = `
            <div class="match-overview">
                <div>
                    <div class="match-overview-teams">🇮🇹 ITALIA vs ${match.team.toUpperCase()} ${match.flag}</div>
                    <div class="match-overview-meta">
                        <div class="meta-chip">📅 ${match.date}</div>
                        <div class="meta-chip">🕘 ${match.time}</div>
                        <div class="meta-chip">📍 ${match.venue}</div>
                    </div>
                </div>
                <div class="match-overview-totals">
                    <div class="ov-stat"><div class="ov-val" style="color:#7ec8f5">${matchSold}</div><div class="ov-lbl">Venduti</div></div>
                    <div class="ov-stat"><div class="ov-val" style="color:#80e080">${matchTotal - matchSold}</div><div class="ov-lbl">Liberi</div></div>
                    <div class="ov-stat"><div class="ov-val" style="color:#f08090">${matchOcc}%</div><div class="ov-lbl">Occupaz.</div></div>
                    <div class="ov-stat"><div class="ov-val" style="color:#ffc107;font-size:1rem">${formatEuro(matchRevenue)}</div><div class="ov-lbl">Incasso</div></div>
                </div>
            </div>
        `;

        // ── Settori ──
        const sectorsRow = document.createElement('div');
        sectorsRow.className = 'sectors-row';

        for (const [secKey, secData] of Object.entries(baseSectors)) {
            const takenList = sectors[secKey] || [];
            const total = secData.rows * secData.cols;
            const taken = takenList.length;
            const free  = total - taken;
            const occ   = total > 0 ? Math.round(taken / total * 100) : 0;
            const revenue = taken * (secData.price + 2);

            const fillColor = occ >= 80 ? '#f08090' : occ >= 50 ? '#ffc107' : '#80e080';

            // Badge colore settore
            const badgeClass = { nord:'badge-nord', sud:'badge-sud', ovest:'badge-ovest', est:'badge-est' }[secKey];

            const card = document.createElement('div');
            card.className = 'sector-card';
            card.innerHTML = `
                <div class="sector-header">
                    <div>
                        <div class="sector-name-badge">${secData.label}</div>
                        <div style="font-size:0.7rem;color:var(--muted);margin-top:3px">€${secData.price}/biglietto</div>
                    </div>
                    ${secData.isVip ? '<div class="sector-vip-tag">⭐ VIP</div>' : ''}
                </div>
                <div class="sector-stats">
                    <div class="stat-pill occupied"><div class="val">${taken}</div><div class="lbl">Occupati</div></div>
                    <div class="stat-pill free"><div class="val">${free}</div><div class="lbl">Liberi</div></div>
                    <div class="stat-pill revenue"><div class="val">${formatEuro(revenue)}</div><div class="lbl">Incasso</div></div>
                </div>
                <div class="occ-bar-wrap">
                    <div class="occ-bar-label"><span>Occupazione</span><span>${occ}%</span></div>
                    <div class="occ-bar-track">
                        <div class="occ-bar-fill" style="width:${occ}%;background:linear-gradient(90deg,${fillColor}80,${fillColor})"></div>
                    </div>
                </div>
                <div class="mini-seat-map">${buildMiniMap(secKey, secData, takenList)}</div>
            `;
            sectorsRow.appendChild(card);
        }

        panel.appendChild(sectorsRow);

        // ── Tabella biglietti ──
        const allTickets = [];
        for (const [secKey, secData] of Object.entries(baseSectors)) {
            const takenList = sectors[secKey] || [];
            takenList.forEach(seatId => {
                allTickets.push({
                    sector: secKey,
                    sectorLabel: secData.label,
                    seatId,
                    seatLabel: seatIdToLabel(seatId),
                    price: secData.price,
                    total: secData.price + 2,
                    isVip: secData.isVip
                });
            });
        }

        const badgeClass = { nord:'badge-nord', sud:'badge-sud', ovest:'badge-ovest', est:'badge-est' };

        const tableSection = document.createElement('div');
        tableSection.className = 'table-section';
        tableSection.innerHTML = `
            <div class="table-header">
                <div class="table-title">📋 Riepilogo Biglietti Acquistati</div>
                <div class="table-counter">${allTickets.length} record trovati</div>
            </div>
            ${allTickets.length === 0
                ? `<div class="empty-state"><div class="icon">🎫</div><p>Nessun biglietto acquistato per questa partita.</p></div>`
                : `<div style="overflow-x:auto">
                    <table class="tickets-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Settore</th>
                                <th>Posto</th>
                                <th>ID Seat</th>
                                <th>Prezzo</th>
                                <th>Prevendita</th>
                                <th>Totale</th>
                                <th>Tipo</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${allTickets.map((t, i) => `
                                <tr>
                                    <td style="color:var(--muted)">${String(i+1).padStart(2,'0')}</td>
                                    <td><span class="badge-sector ${badgeClass[t.sector]}">${t.sectorLabel}</span></td>
                                    <td><span class="seat-code">${t.seatLabel}</span></td>
                                    <td style="color:var(--muted)">${t.seatId}</td>
                                    <td class="price-cell">€ ${t.price.toFixed(2)}</td>
                                    <td style="color:var(--muted)">€ 2.00</td>
                                    <td class="price-cell">€ ${t.total.toFixed(2)}</td>
                                    <td>${t.isVip ? '<span style="color:#ffc107">⭐ VIP</span>' : '<span style="color:var(--muted)">Standard</span>'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                   </div>`
            }
        `;

        panel.appendChild(tableSection);
        container.appendChild(panel);
    });
}

// ─────────────────────────────────────────
//  MINI MAPPA POSTI
// ─────────────────────────────────────────
function buildMiniMap(secKey, secData, takenList) {
    let html = `<div class="mini-map-label">◀ Campo ▶</div>`;
    const mid = Math.floor(secData.cols / 2);

    for (let r = 1; r <= secData.rows; r++) {
        html += `<div class="mini-seat-row">`;
        for (let c = 1; c <= secData.cols; c++) {
            if (c === mid + 1) html += `<div class="mini-seat-gap"></div>`;
            const id = `${r}-${c}`;
            const isTaken = takenList.includes(id);
            const cls = isTaken
                ? (secData.isVip ? 'vip-taken' : 'taken')
                : (secData.isVip ? 'vip-free'  : 'free');
            html += `<div class="mini-seat ${cls}" title="Posto ${seatIdToLabel(id)}${isTaken ? ' — Occupato' : ' — Libero'}"></div>`;
        }
        html += `</div>`;
    }
    return html;
}

// ─────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────
window.addEventListener('load', loadData);

// Auto-refresh ogni 10 secondi (utile se biglietti.html è aperto su un'altra tab)
setInterval(loadData, 10000);
</script>
